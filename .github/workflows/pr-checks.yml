name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-title-check:
    name: PR Title Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;

            let label = '';
            if (changes < 100) label = 'size/XS';
            else if (changes < 300) label = 'size/S';
            else if (changes < 600) label = 'size/M';
            else if (changes < 1000) label = 'size/L';
            else label = 'size/XL';

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: [label]
              });
            } catch (error) {
              if (error.status === 403) {
                core.warning(`Unable to add PR size label "${label}" because this workflow token does not have label write permission.`);
              } else {
                throw error;
              }
            }

            if (changes > 1000) {
              core.warning('This PR is very large. Consider breaking it into smaller PRs.');
            }

  conflict-check:
    name: Conflict Check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const labelName = 'merge-conflict';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: labelName,
                  color: 'e11d48', description: 'PR has merge conflicts'
                });
              } else { throw e; }
            }

            // Poll mergeability (GitHub computes it asynchronously)
            let mergeable = null;
            for (let i = 0; i < 5 && mergeable === null; i++) {
              await new Promise(r => setTimeout(r, 3000));
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              mergeable = pr.mergeable;
            }

            const labels = (await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            })).data.map(l => l.name);

            if (mergeable === false) {
              if (!labels.includes(labelName)) {
                await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [labelName] });
              }
              core.setFailed('PR has merge conflicts with the base branch.');
            } else {
              if (labels.includes(labelName)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: labelName });
              }
              console.log('No merge conflicts detected.');
            }
